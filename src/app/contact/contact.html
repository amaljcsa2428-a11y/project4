<section id="contact" class="contact-section py-5">
  <div class="container">
    <div class="row g-4">
      <div class="col-lg-6">
        <div class="card contact-card shadow-sm p-4 h-100">
          <h2 class="mb-3">Contact Us</h2>
          <p class="text-muted mb-4">Send us a message and our support team will get back to you soon.</p>
          <form>
            <div class="row g-3">
              <div class="col-md-6">
                <input type="text" class="form-control" placeholder="Your name" aria-label="Name" />
              </div>
              <div class="col-md-6">
                <input type="email" class="form-control" placeholder="Your email" aria-label="Email" />
              </div>
              <div class="col-12">
                <textarea class="form-control" rows="4" placeholder="Your message"></textarea>
              </div>
              <div class="col-12 text-end">
                <button type="submit" class="btn btn-primary">Send Message</button>
              </div>
            </div>
          </form>
        </div>
      </div>
      <div class="col-lg-6">
        <div class="card map-card shadow-sm overflow-hidden h-100">
          <div class="map-header p-4 bg-primary text-white">
            <h2 class="mb-1">Find Us</h2>
            <p class="mb-0">Visit our store location or use the map to get directions.</p>
          </div>
          <iframe
            class="contact-map"
            src="https://maps.google.com/maps?q=New+York+City&t=&z=13&ie=UTF8&iwloc=&output=embed"
            allowfullscreen
            loading="lazy"
            referrerpolicy="no-referrer-when-downgrade"
          ></iframe>
        </div>
      </div>
    </div>
  </div>
</section>
